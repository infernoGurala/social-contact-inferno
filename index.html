<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>infenro · socials</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #141418;
      --surface2: #1a1a21;
      --border: rgba(255,255,255,0.07);
      --accent: #c8f060;
      --text: #e8e8ec;
      --muted: #666676;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      overflow-x: hidden;
    }

    /* Blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(200,240,96,0.06) 0%, transparent 70%);
      top: -80px; right: -80px;
    }
    .blob-2 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(96,200,240,0.04) 0%, transparent 70%);
      bottom: 100px; left: -80px;
    }

    /* Noise */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Back link */
    .back {
      align-self: flex-start;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 48px;
      transition: color 0.2s;
    }
    .back:hover { color: var(--text); }

    /* Profile */
    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 48px;
      animation: fadeUp 0.7s ease both;
    }

    .avatar {
      width: 72px; height: 72px;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(200,240,96,0.15), rgba(96,200,240,0.1));
      border: 1px solid rgba(200,240,96,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin-bottom: 4px;
    }

    .profile-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.6rem;
      letter-spacing: -0.03em;
    }
    .profile-name span { color: var(--accent); }

    .profile-bio {
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
      font-weight: 300;
      max-width: 320px;
      line-height: 1.6;
    }

    /* Cards */
    .cards {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px 24px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.3s, transform 0.3s, background 0.3s;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.6s ease forwards;
    }
    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.2s; }
    .card:nth-child(3) { animation-delay: 0.3s; }
    .card:nth-child(4) { animation-delay: 0.4s; }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .card.github::before  { background: linear-gradient(135deg, rgba(255,255,255,0.03), transparent); }
    .card.telegram::before { background: linear-gradient(135deg, rgba(39,174,245,0.05), transparent); }
    .card.gmail::before   { background: linear-gradient(135deg, rgba(234,67,53,0.05), transparent); }
    .card.linkedin::before { background: linear-gradient(135deg, rgba(10,102,194,0.05), transparent); }

    .card:hover {
      transform: translateY(-3px);
      background: var(--surface2);
    }
    .card:hover::before { opacity: 1; }

    .card.github:hover  { border-color: rgba(255,255,255,0.15); }
    .card.telegram:hover { border-color: rgba(39,174,245,0.25); }
    .card.gmail:hover   { border-color: rgba(234,67,53,0.25); }
    .card.linkedin:hover { border-color: rgba(10,102,194,0.3); }

    .icon-wrap {
      width: 48px; height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border: 1px solid var(--border);
    }
    .github  .icon-wrap { background: rgba(255,255,255,0.05); }
    .telegram .icon-wrap { background: rgba(39,174,245,0.08); border-color: rgba(39,174,245,0.15); }
    .gmail   .icon-wrap { background: rgba(234,67,53,0.08);  border-color: rgba(234,67,53,0.15); }
    .linkedin .icon-wrap { background: rgba(10,102,194,0.08); border-color: rgba(10,102,194,0.2); }

    .icon-wrap svg { width: 22px; height: 22px; }

    .card-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .card-platform {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .card-handle {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: -0.01em;
    }

    .card-chevron {
      color: var(--muted);
      transition: transform 0.2s, color 0.2s;
      flex-shrink: 0;
    }
    .card:hover .card-chevron {
      transform: translateX(4px);
      color: var(--accent);
    }

    /* Footer */
    .footer {
      margin-top: 48px;
      text-align: center;
      animation: fadeUp 0.7s 0.5s ease both;
      opacity: 0;
    }
    .footer a {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer a span { color: var(--accent); }
    .footer a:hover { color: var(--text); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
